<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PubGolf Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1E3C;
    --card: #E2E8F2;
    --card-hover: #edf2f9;
    --accent: #C6FF00;
    --accent-glow: rgba(198,255,0,0.25);
    --blue: #2A6BFF;
    --blue-glow: rgba(42,107,255,0.2);
    --text-primary: #FFFFFF;
    --text-secondary: #D5E1F2;
    --text-dark: #0B1E3C;
    --text-muted: #6B7F9E;
    --border: rgba(255,255,255,0.08);
    --danger: #FF3B5C;
    --success: #00E676;
    --radius: 24px;
    --radius-sm: 16px;
    --radius-xs: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,0.3);
    --shadow-card: 0 4px 20px rgba(0,0,0,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
    padding-bottom: 100px;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow-x: hidden;
  }

  /* Circuit background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      /* Corner circuit nodes */
      radial-gradient(circle at 5% 5%, rgba(198,255,0,0.04) 0%, transparent 40%),
      radial-gradient(circle at 95% 10%, rgba(42,107,255,0.05) 0%, transparent 40%),
      radial-gradient(circle at 10% 90%, rgba(42,107,255,0.04) 0%, transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(198,255,0,0.04) 0%, transparent 40%),
      /* Center glow */
      radial-gradient(ellipse at 50% 40%, rgba(42,107,255,0.06) 0%, transparent 60%),
      /* Circuit grid */
      repeating-linear-gradient(0deg, transparent, transparent 58px, rgba(198,255,0,0.015) 58px, rgba(198,255,0,0.015) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 58px, rgba(198,255,0,0.015) 58px, rgba(198,255,0,0.015) 60px);
    pointer-events: none;
    z-index: 0;
  }
  /* Circuit dots */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(198,255,0,0.06) 1px, transparent 1px),
      radial-gradient(circle at 50% 8%, rgba(42,107,255,0.06) 1px, transparent 1px),
      radial-gradient(circle at 85% 25%, rgba(198,255,0,0.04) 1px, transparent 1px),
      radial-gradient(circle at 10% 60%, rgba(42,107,255,0.05) 1px, transparent 1px),
      radial-gradient(circle at 70% 70%, rgba(198,255,0,0.04) 1px, transparent 1px),
      radial-gradient(circle at 90% 45%, rgba(42,107,255,0.04) 1px, transparent 1px),
      radial-gradient(circle at 30% 85%, rgba(198,255,0,0.04) 1px, transparent 1px),
      radial-gradient(circle at 60% 15%, rgba(42,107,255,0.05) 1px, transparent 1px);
    background-size: 180px 180px;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
    padding: 0 8px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 24px 16px 16px;
    position: relative;
  }
  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.8rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent) 0%, #8FFF00 40%, var(--blue) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    text-shadow: none;
    position: relative;
  }
  .header h1::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    margin: 8px auto 0;
    border-radius: 2px;
  }
  .header p {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.7;
  }

  /* ── Bottom Nav ── */
  .nav-bar {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 4px;
    background: rgba(11,30,60,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    max-width: 420px;
    width: calc(100% - 32px);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all .25s ease;
    background: transparent;
    color: rgba(255,255,255,0.5);
  }
  .nav-btn.active {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .nav-btn:not(.active):active {
    color: rgba(255,255,255,0.8);
  }
  .nav-btn i { pointer-events: none; }

  .view { display: none; }
  .view.active { display: block; animation: fadeIn .3s ease; }
  .view-sub { display: none; }
  .view-sub.active { display: block; animation: fadeIn .25s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .page-content { padding: 8px 8px 16px; }

  .view-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-secondary);
    margin-bottom: 16px;
    opacity: 0.6;
    text-align: center;
    padding: 0 4px;
  }

  /* ── Teams ── */
  .team-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  @media (min-width: 500px) {
    .team-grid { grid-template-columns: 1fr 1fr 1fr; }
  }
  .team-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 16px;
    cursor: pointer;
    transition: all .2s ease;
    border: 2px solid transparent;
    text-align: center;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .team-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), transparent);
    opacity: 0;
    transition: opacity .2s;
  }
  .team-card.has-scores::before { opacity: 1; }
  .team-card:active { transform: scale(0.96); }
  .team-card.has-scores { border-color: rgba(198,255,0,0.3); }
  .team-card .team-nr {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .team-card .team-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.2rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dark);
  }
  .team-card .team-players {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .team-card .total-badge {
    display: inline-block;
    margin-top: 10px;
    background: var(--bg);
    color: var(--accent);
    padding: 4px 16px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 800;
    border-radius: 30px;
    letter-spacing: 2px;
    box-shadow: 0 0 12px rgba(198,255,0,0.15);
  }

  /* ── Back button ── */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 10px 18px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
    border-radius: var(--radius-sm);
    transition: all .2s;
  }
  .back-btn:active { background: rgba(255,255,255,0.1); }

  /* ── Admin header ── */
  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    background: rgba(255,255,255,0.05);
    padding: 14px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .admin-header h2 {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .admin-header .team-subtitle {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    margin-top: 2px;
    opacity: 0.7;
  }

  /* ── Hole Cards ── */
  .score-list { display: flex; flex-direction: column; gap: 10px; }

  .hole-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px 18px 14px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.03);
    position: relative;
    overflow: hidden;
    transition: all .25s ease;
  }
  .hole-card.hole-expanded { border-radius: var(--radius) var(--radius) 16px 16px; }

  .hole-main {
    display: grid;
    grid-template-columns: 44px 1fr 52px;
    gap: 10px;
    align-items: start;
  }
  .hole-nr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 2px;
  }
  .hole-nr-wrap .hole-label {
    font-family: 'Orbitron', monospace;
    font-size: 0.45rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
  }
  .hole-nr-wrap .hole-nr {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text-dark);
    line-height: 1;
    margin-top: 1px;
  }

  .hole-info .hole-pub {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dark);
    cursor: pointer;
    transition: color .15s;
  }
  .hole-info .hole-pub:active { color: var(--blue); }
  .hole-info .hole-challenge {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .hole-info .hole-challenge .ch-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    background: rgba(11,30,60,0.06);
    color: var(--text-muted);
    font-family: 'Orbitron', monospace;
  }
  .hole-info .hole-challenge .diff-tag {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    font-family: 'Orbitron', monospace;
  }
  .diff-tag.normaal { background: rgba(0,230,118,0.15); color: #00A855; }
  .diff-tag.fanatiek { background: rgba(255,59,92,0.12); color: var(--danger); }
  .diff-tag.chaos { background: rgba(198,255,0,0.12); color: #8DD000; }

  .hole-score-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .hole-score-wrap input {
    width: 100%;
    padding: 8px 2px;
    border: 2px solid rgba(11,30,60,0.12);
    border-radius: var(--radius-xs);
    background: white;
    color: var(--text-dark);
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 800;
    text-align: center;
    outline: none;
    transition: all .2s;
    -moz-appearance: textfield;
  }
  .hole-score-wrap input::-webkit-outer-spin-button,
  .hole-score-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .hole-score-wrap input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .hole-score-wrap input::placeholder { color: #B0BEC5; font-weight: 600; }
  .hole-score-wrap .adj-badge {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 20px;
    text-align: center;
    min-width: 28px;
  }
  .hole-score-wrap .adj-badge.neg { color: white; background: var(--success); }
  .hole-score-wrap .adj-badge.pos { color: white; background: var(--danger); }
  .hole-score-wrap .adj-badge.zero { color: var(--text-muted); background: rgba(11,30,60,0.05); }

  /* Challenge panel inside hole card */
  .challenge-panel {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(11,30,60,0.08);
    display: none;
    animation: slideUp .25s ease;
  }
  .challenge-panel.open { display: block; }

  .challenge-panel .ch-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dark);
  }
  .challenge-panel .ch-desc {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.5;
  }
  .challenge-panel .ch-scoring {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 6px;
    padding: 6px 10px;
    background: rgba(11,30,60,0.04);
    border-radius: 8px;
  }
  .challenge-panel .ch-scoring strong { color: var(--text-dark); }

  .ch-section-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.55rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 10px 0 4px;
  }
  .ch-section-title.bonus { color: #00A855; }
  .ch-section-title.penalty { color: var(--danger); }

  .ch-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .ch-item:active { background: rgba(11,30,60,0.04); }
  .ch-item .ch-label {
    font-size: 0.8rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dark);
  }
  .ch-item .ch-label .check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid rgba(11,30,60,0.15);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: all .15s;
    flex-shrink: 0;
    background: white;
  }
  .ch-item.done .ch-label .check {
    background: var(--success);
    border-color: var(--success);
    color: white;
  }
  .ch-item.done .ch-label .check::after { content: 'L'; font-weight: 700; }
  .ch-item .ch-pts {
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
  }
  .ch-item .ch-pts.neg { color: white; background: var(--success); }
  .ch-item .ch-pts.pos { color: white; background: var(--danger); }

  /* ── Total Row ── */
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, rgba(198,255,0,0.08) 0%, rgba(42,107,255,0.08) 100%);
    border-radius: var(--radius);
    padding: 16px 22px;
    margin-top: 12px;
    border: 1px solid rgba(198,255,0,0.15);
    position: relative;
    overflow: hidden;
  }
  .total-row::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--blue), var(--accent));
  }
  .total-row .label {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--text-secondary);
  }
  .total-row .value {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent-glow);
  }

  /* ── Buttons ── */
  .footer-actions {
    display: flex;
    gap: 10px;
    margin-top: 14px;
  }
  .footer-actions button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .footer-actions .save-btn {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .footer-actions .save-btn:active { transform: scale(0.97); }

  .clear-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: rgba(255,59,92,0.08);
    color: var(--danger);
    border: 1px solid rgba(255,59,92,0.2);
    border-radius: var(--radius-sm);
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .clear-btn:active { background: rgba(255,59,92,0.15); }

  /* ── Leaderboard ── */
  .leaderboard { display: flex; flex-direction: column; gap: 10px; }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    box-shadow: var(--shadow-card);
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .lb-row:first-child {
    border: 1px solid rgba(198,255,0,0.2);
    box-shadow: 0 4px 24px rgba(198,255,0,0.1);
  }
  .lb-row.tie { border-left: 4px solid var(--accent); }

  .lb-rank {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    min-width: 40px;
    text-align: center;
    line-height: 1;
  }
  .lb-rank.gold { color: var(--accent); text-shadow: 0 0 16px var(--accent-glow); }
  .lb-rank.silver { color: #7A8BA8; }
  .lb-rank.bronze { color: #CD7F32; }
  .lb-rank.normal { color: var(--text-muted); }

  .lb-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--bg), #0f2a50);
    border: 2px solid rgba(255,255,255,0.1);
  }
  .lb-row:first-child .lb-avatar {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
    background: linear-gradient(135deg, var(--bg), #1a2a1a);
  }

  .lb-info {
    flex: 1;
    min-width: 0;
  }
  .lb-info .lb-team {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dark);
  }
  .lb-info .lb-players {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .lb-progress {
    width: 80px;
    height: 6px;
    background: rgba(11,30,60,0.08);
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .lb-progress .lb-progress-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    transition: width .6s ease;
  }
  .lb-row:first-child .lb-progress .lb-progress-fill {
    box-shadow: 0 0 8px var(--accent-glow);
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius);
    border: 1px dashed var(--border);
    font-size: 0.9rem;
    font-weight: 500;
    opacity: 0.6;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    color: var(--accent);
    padding: 12px 28px;
    border-radius: 30px;
    border: 1px solid rgba(198,255,0,0.2);
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 0.75rem;
    opacity: 0;
    transition: opacity .3s ease, transform .3s ease;
    pointer-events: none;
    z-index: 999;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .toast.show { opacity: 1; }

  /* ── Reset ── */
  .reset-all-btn {
    position: fixed;
    bottom: 80px;
    left: 16px;
    background: rgba(255,255,255,0.04);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 12px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    cursor: pointer;
    opacity: 0.3;
    transition: opacity .2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .reset-all-btn:active { opacity: 0.8; }

  /* ── Animations ── */
  .team-card, .hole-card, .lb-row {
    animation: fadeIn .35s ease backwards;
  }
  .team-card:nth-child(1) { animation-delay: 0s; }
  .team-card:nth-child(2) { animation-delay: .04s; }
  .team-card:nth-child(3) { animation-delay: .08s; }
  .team-card:nth-child(4) { animation-delay: .12s; }
  .team-card:nth-child(5) { animation-delay: .16s; }
  .team-card:nth-child(6) { animation-delay: .20s; }
  .team-card:nth-child(7) { animation-delay: .24s; }

  .hole-card:nth-child(1) { animation-delay: 0s; }
  .hole-card:nth-child(2) { animation-delay: .03s; }
  .hole-card:nth-child(3) { animation-delay: .06s; }
  /* nth-child not feasible for dynamic lists, using inline style in JS */

  .lb-row:nth-child(1) { animation-delay: 0s; }
  .lb-row:nth-child(2) { animation-delay: .06s; }
  .lb-row:nth-child(3) { animation-delay: .12s; }
  .lb-row:nth-child(4) { animation-delay: .18s; }
  .lb-row:nth-child(5) { animation-delay: .24s; }
  .lb-row:nth-child(6) { animation-delay: .30s; }
  .lb-row:nth-child(7) { animation-delay: .36s; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

  /* ── Lucide icon sizing ── */
  .nav-btn i, .back-btn i, .footer-actions button i, .clear-btn i, .reset-all-btn i {
    width: 18px; height: 18px;
    display: inline-block;
    vertical-align: middle;
  }
  .nav-btn i { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="app">

<div class="header">
  <h1>PUBGOLF</h1>
  <p>Wageningen &#8226; 2026</p>
</div>

<div class="page-content">
<div id="view-admin" class="view active">
  <div id="admin-teams" class="view-sub active">
    <div class="view-label">&#9670; Kies een team</div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
  <div id="admin-scores" class="view-sub">
    <button class="back-btn" onclick="showTeams()">
      <i data-lucide="arrow-left"></i> Teams
    </button>
    <div class="admin-header">
      <div>
        <h2 id="scoreTeamName"></h2>
        <div class="team-subtitle" id="scoreTeamPlayers"></div>
      </div>
    </div>
    <div class="score-list" id="scoreList"></div>
    <div class="footer-actions">
      <button class="save-btn" onclick="saveCurrentScores()">
        <i data-lucide="save"></i> Opslaan
      </button>
    </div>
    <button class="clear-btn" onclick="clearCurrentScores()">
      <i data-lucide="trash-2"></i> Alles wissen
    </button>
  </div>
</div>

<div id="view-public" class="view">
  <div class="view-label">&#9670; Live stand</div>
  <div class="leaderboard" id="leaderboard"></div>
  <div class="empty-state" id="lbEmpty">
    <div class="icon">&#127942;</div>
    Nog geen scores ingevoerd
  </div>
</div>
</div>

</div><!-- /app -->

<div class="nav-bar">
  <button class="nav-btn active" data-view="admin" onclick="switchView('admin')">
    <i data-lucide="pen-square"></i> Admin
  </button>
  <button class="nav-btn" data-view="public" onclick="switchView('public')">
    <i data-lucide="trophy"></i> Scoreboard
  </button>
</div>

<div class="toast" id="toast"></div>
<button class="reset-all-btn" onclick="resetAll()">
  <i data-lucide="refresh-cw"></i> Reset
</button>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
// ========== DATA ==========
const TEAMS = [
  { id: 1, name: "Team 1", players: "Joep & Aaron" },
  { id: 2, name: "Team 2", players: "Reinder & Jutter" },
  { id: 3, name: "Team 3", players: "Finn & Stijn" },
  { id: 4, name: "Team 4", players: "Sem & Max" },
  { id: 5, name: "Team 5", players: "Tim & Justin" },
  { id: 6, name: "Team 6", players: "Dean & Rens" },
  { id: 7, name: "Team 7", players: "Bram & Mendel" },
];

const PUBS = [
  "O'Casey's Irish Pub & Restaurant",
  "The Fiddler",
  "Huppel The Pub",
  "Sixpence Public House",
  "Ned Kelly's Irish Pub",
  "Bierspeciaal Café De Paas",
  "Rootz",
  "Café Momfer de Mol",
  "Café de Landman",
  "Gekke Geit",
  "Bleyenberg",
  "Pavlov",
  "Hoppzak",
  "Café September",
  "De Zwarte Ruiter",
  "Kompaan Binnenhaven (finish)",
];

const CHALLENGES = [
  {
    id: 'huisfavoriet',
    name: 'Huisfavoriet',
    description: 'Vraag aan de bar wat hier het huisdrankje is. Bestel het als team en noteer de naam.',
    scoring: 'Elke slok is een slag',
    difficulty: 'NORMAAL',
    items: [
      { type: 'bonus', label: 'Prijs exact geraden vooraf', points: -1 },
      { type: 'penalty', label: 'Naam van het drankje vergeten', points: 1 },
    ],
  },
  {
    id: 'wat-kost-de-schade',
    name: 'Wat kost de schade',
    description: "Raad vóór het bestellen wat jullie hele ronde gaat kosten. Schrijf het op vóór de bar het zegt.",
    scoring: 'Eén gok per team',
    difficulty: 'NORMAAL',
    items: [
      { type: 'bonus', label: 'Dichtstbijzijnde team', points: -1 },
      { type: 'bonus', label: 'Exact geraden', points: -2 },
      { type: 'penalty', label: 'Verste ernaast', points: 1 },
    ],
  },
  {
    id: 'verkoop-dat-glas',
    name: 'Verkoop dat glas',
    description: 'Geef jullie drankje een veel te serieuze verkooppitch van maximaal 20 seconden. Andere teams jureren.',
    scoring: 'Beste pitch wint',
    difficulty: 'NORMAAL',
    items: [
      { type: 'bonus', label: 'Beste pitch (meeste stemmen)', points: -1 },
      { type: 'penalty', label: 'Lafste (geen poging)', points: 1 },
    ],
  },
  {
    id: 'geen-veilige-keuze',
    name: 'Geen veilige keuze',
    description: 'Kies het drankje met de meest overdreven naam op de kaart. Iets dat je normaal nooit zou nemen.',
    scoring: 'Standaard scoring',
    difficulty: 'FANATIEK',
    items: [
      { type: 'bonus', label: 'Ander team noemt jullie keuze de gekste', points: -1 },
      { type: 'penalty', label: 'Stiekem toch een veilige keuze', points: 2 },
    ],
  },
  {
    id: 'alles-of-niks',
    name: 'Alles of niks',
    description: 'Roep de hole-in-one vóór je begint: het hele drankje in één teug, geen pauzes.',
    scoring: 'Elke slok is een slag',
    difficulty: 'FANATIEK',
    items: [
      { type: 'bonus', label: 'Hole-in-one gelukt (in één teug)', points: -1 },
      { type: 'penalty', label: 'Aangekondigd maar afgebroken', points: 1 },
    ],
  },
  {
    id: 'caddie-offer',
    name: 'Caddie-offer',
    description: 'Wijs één teamlid aan als caddie voor deze hole. Die persoon houdt score bij en mag één strafslag van het team verplaatsen naar een ander teamlid.',
    scoring: 'Standaard scoring per hole',
    difficulty: 'CHAOS',
    items: [
      { type: 'penalty', label: 'Caddie maakt rekenfout', points: 1 },
    ],
  },
  {
    id: 'sabotageronde',
    name: 'Sabotageronde',
    description: 'Het team rechts van jullie kiest één drankje van de kaart dat jullie team moet bestellen. Geen extreme keuzes.',
    scoring: 'Elke slok is een slag',
    difficulty: 'FANATIEK',
    items: [
      { type: 'penalty', label: 'Geweigerd', points: 2 },
    ],
  },
  {
    id: 'stille-hole',
    name: 'Stille hole',
    description: 'Communiceer onderling alleen via gebaren. Aan de bar gewoon vriendelijk praten.',
    scoring: 'Standaard scoring',
    difficulty: 'CHAOS',
    items: [
      { type: 'bonus', label: 'Hele hole onderling stil geweest', points: -2 },
      { type: 'penalty', label: 'Onderling gepraat (per overtreding)', points: 1 },
    ],
  },
];

const PUB_CHALLENGE_IDS = [
  'huisfavoriet', 'wat-kost-de-schade', 'verkoop-dat-glas', 'geen-veilige-keuze',
  'alles-of-niks', 'caddie-offer', 'sabotageronde', 'stille-hole',
  'wat-kost-de-schade', 'alles-of-niks', 'huisfavoriet', 'verkoop-dat-glas',
  'caddie-offer', 'geen-veilige-keuze', 'stille-hole', 'sabotageronde',
];

// ========== STATE ==========
let scores = loadScores();
let challengeToggles = loadToggles();
let currentTeamId = null;
let expandedPubId = null;

// ========== STORAGE ==========
function loadScores() {
  try { return JSON.parse(localStorage.getItem('pubgolf_scores')) || {}; } catch { return {}; }
}
function saveScores() {
  localStorage.setItem('pubgolf_scores', JSON.stringify(scores));
}
function loadToggles() {
  try { return JSON.parse(localStorage.getItem('pubgolf_toggles')) || {}; } catch { return {}; }
}
function saveToggles() {
  localStorage.setItem('pubgolf_toggles', JSON.stringify(challengeToggles));
}

// ========== HELPERS ==========
function getChallenge(pubId) {
  const id = PUB_CHALLENGE_IDS[pubId];
  return CHALLENGES.find(c => c.id === id);
}

function getChallengeAdjustment(teamId, pubId) {
  const ch = getChallenge(pubId);
  if (!ch) return 0;
  const done = (challengeToggles[teamId] && challengeToggles[teamId][pubId]) || [];
  let adj = 0;
  done.forEach(idx => {
    if (ch.items[idx]) adj += ch.items[idx].points;
  });
  return adj;
}

function getPubTotal(teamId, pubId) {
  const base = (scores[teamId] && scores[teamId][pubId]);
  const strokes = (base !== undefined && base !== '') ? parseInt(base) : 0;
  if (isNaN(strokes)) return null;
  return strokes + getChallengeAdjustment(teamId, pubId);
}

function getTeamTotal(teamId) {
  let sum = 0, count = 0;
  for (let i = 0; i < PUBS.length; i++) {
    const t = getPubTotal(teamId, i);
    if (t !== null) { sum += t; count++; }
  }
  return count > 0 ? sum : null;
}

function hasAnyScores(teamId) {
  if (scores[teamId]) {
    for (const v of Object.values(scores[teamId])) {
      if (v !== '' && !isNaN(parseInt(v))) return true;
    }
  }
  if (challengeToggles[teamId]) {
    for (const arr of Object.values(challengeToggles[teamId])) {
      if (arr && arr.length > 0) return true;
    }
  }
  return false;
}

function getPubCount(teamId) {
  if (!scores[teamId]) return 0;
  return Object.values(scores[teamId]).filter(v => v !== '' && !isNaN(parseInt(v))).length;
}

// ========== RENDER ==========
function renderTeams() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = TEAMS.map(t => {
    const total = getTeamTotal(t.id);
    const has = hasAnyScores(t.id);
    return `<div class="team-card${has ? ' has-scores' : ''}" onclick="openTeam(${t.id})">
      <div class="team-nr">${t.name}</div>
      <div class="team-name">${t.players}</div>
      ${total !== null ? `<div class="total-badge">${total}</div>` : ''}
    </div>`;
  }).join('');
}

function openTeam(teamId) {
  currentTeamId = teamId;
  expandedPubId = null;
  const t = TEAMS.find(x => x.id === teamId);
  document.getElementById('scoreTeamName').textContent = t.name;
  document.getElementById('scoreTeamPlayers').textContent = t.players;
  if (!scores[teamId]) scores[teamId] = {};
  if (!challengeToggles[teamId]) challengeToggles[teamId] = {};
  renderScoreList();
  document.getElementById('admin-teams').classList.remove('active');
  document.getElementById('admin-scores').classList.add('active');
  lucide.createIcons();
}

function renderScoreList() {
  const list = document.getElementById('scoreList');
  const teamId = currentTeamId;
  let html = '';

  PUBS.forEach((pub, i) => {
    const val = (scores[teamId] && scores[teamId][i]) || '';
    const adj = getChallengeAdjustment(teamId, i);
    const adjClass = adj < 0 ? 'neg' : adj > 0 ? 'pos' : 'zero';
    const adjDisplay = adj !== 0 ? (adj > 0 ? '+' : '') + adj : '';
    const filled = val !== '';
    const isExpanded = expandedPubId === i;
    const ch = getChallenge(i);

    html += `<div class="hole-card${isExpanded ? ' hole-expanded' : ''}" style="animation:fadeIn .3s ease backwards;animation-delay:${i * 0.03}s">`;
    html += `<div class="hole-main">`;
    html += `<div class="hole-nr-wrap">
      <div class="hole-label">Hole</div>
      <div class="hole-nr">${String(i + 1).padStart(2, '0')}</div>
    </div>`;
    html += `<div class="hole-info">
      <div class="hole-pub" onclick="toggleChallenge(${i})">${pub}</div>`;
    if (ch) {
      html += `<div class="hole-challenge">
        <span class="ch-tag">${ch.name}</span>
        <span class="diff-tag ${ch.difficulty.toLowerCase()}">${ch.difficulty}</span>
      </div>`;
    }
    html += `</div>`;
    html += `<div class="hole-score-wrap">
      <input type="number" min="1" max="30" inputmode="numeric" placeholder="-" value="${val}"
        oninput="onScoreInput(${teamId}, ${i}, this.value)">
      <div class="adj-badge ${adjClass}">${adjDisplay || '0'}</div>
    </div>`;
    html += `</div>`;

    // Challenge panel
    html += `<div class="challenge-panel${isExpanded ? ' open' : ''}">`;
    if (ch) {
      const done = (challengeToggles[teamId] && challengeToggles[teamId][i]) || [];
      html += `<div class="ch-name">${ch.name}</div>`;
      html += `<div class="ch-desc">${ch.description}</div>`;
      html += `<div class="ch-scoring"><strong>Score:</strong> ${ch.scoring}</div>`;

      const bonuses = ch.items.filter(it => it.type === 'bonus');
      const penalties = ch.items.filter(it => it.type === 'penalty');

      if (bonuses.length > 0) {
        html += `<div class="ch-section-title bonus">&#11088; Bonussen</div>`;
        bonuses.forEach((item) => {
          const globalIdx = ch.items.indexOf(item);
          const isDone = done.includes(globalIdx);
          const ptsDisplay = item.points < 0 ? item.points : '+' + item.points;
          html += `<div class="ch-item${isDone ? ' done' : ''}" onclick="toggleItem(${teamId}, ${i}, ${globalIdx})">
            <span class="ch-label"><span class="check"></span>${item.label}</span>
            <span class="ch-pts neg">${ptsDisplay}</span>
          </div>`;
        });
      }

      if (penalties.length > 0) {
        html += `<div class="ch-section-title penalty">&#9888; Strafslagen</div>`;
        penalties.forEach((item) => {
          const globalIdx = ch.items.indexOf(item);
          const isDone = done.includes(globalIdx);
          const ptsDisplay = item.points > 0 ? '+' + item.points : item.points;
          html += `<div class="ch-item${isDone ? ' done' : ''}" onclick="toggleItem(${teamId}, ${i}, ${globalIdx})">
            <span class="ch-label"><span class="check"></span>${item.label}</span>
            <span class="ch-pts pos">${ptsDisplay}</span>
          </div>`;
        });
      }
    }
    html += `</div>`;
    html += `</div>`;
  });

  const total = getTeamTotal(teamId);
  html += `<div class="total-row">
    <span class="label">Eindtotaal</span>
    <span class="value">${total !== null ? total : '--'}</span>
  </div>`;

  list.innerHTML = html;
  lucide.createIcons();
}

// ========== INTERACTIONS ==========
function toggleChallenge(pubId) {
  expandedPubId = expandedPubId === pubId ? null : pubId;
  renderScoreList();
}

function toggleItem(teamId, pubId, itemIdx) {
  if (!challengeToggles[teamId]) challengeToggles[teamId] = {};
  if (!challengeToggles[teamId][pubId]) challengeToggles[teamId][pubId] = [];
  const arr = challengeToggles[teamId][pubId];
  const idx = arr.indexOf(itemIdx);
  if (idx === -1) arr.push(itemIdx);
  else arr.splice(idx, 1);
  saveToggles();
  renderScoreList();
  renderLeaderboard();
  renderTeams();
}

function onScoreInput(teamId, pubId, val) {
  if (!scores[teamId]) scores[teamId] = {};
  scores[teamId][pubId] = val;
  saveScores();
  renderScoreList();
  renderLeaderboard();
  renderTeams();
}

function saveCurrentScores() {
  saveScores();
  saveToggles();
  showToast('Scores opgeslagen!');
}

function clearCurrentScores() {
  if (!currentTeamId) return;
  if (!confirm('Weet je zeker dat je alle scores voor dit team wilt wissen?')) return;
  scores[currentTeamId] = {};
  challengeToggles[currentTeamId] = {};
  saveScores();
  saveToggles();
  renderScoreList();
  renderLeaderboard();
  renderTeams();
}

function showTeams() {
  currentTeamId = null;
  expandedPubId = null;
  document.getElementById('admin-scores').classList.remove('active');
  document.getElementById('admin-teams').classList.add('active');
  renderTeams();
  lucide.createIcons();
}

// ========== LEADERBOARD ==========
function renderLeaderboard() {
  const container = document.getElementById('leaderboard');
  const empty = document.getElementById('lbEmpty');

  const ranked = TEAMS
    .map(t => ({ ...t, total: getTeamTotal(t.id) }))
    .filter(t => t.total !== null)
    .sort((a, b) => a.total - b.total);

  if (ranked.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  let currentRank = 1;
  let prevTotal = null;
  const maxRank = ranked.length;

  container.innerHTML = ranked.map((t, i) => {
    const isTie = prevTotal !== null && t.total === prevTotal;
    if (!isTie) currentRank = i + 1;
    prevTotal = t.total;

    let rankClass = 'normal';
    if (currentRank === 1) rankClass = 'gold';
    else if (currentRank === 2) rankClass = 'silver';
    else if (currentRank === 3) rankClass = 'bronze';

    // Progress bar based on inverse rank position (visual only)
    const progressPct = Math.max(20, Math.round((1 - (currentRank - 1) / maxRank) * 85));

    // Avatar gradient based on team id
    const avatarColors = [
      'linear-gradient(135deg,#0B1E3C,#1a3a5a)',
      'linear-gradient(135deg,#0B1E3C,#2a1a3a)',
      'linear-gradient(135deg,#0B1E3C,#1a3a2a)',
      'linear-gradient(135deg,#0B1E3C,#3a1a1a)',
      'linear-gradient(135deg,#0B1E3C,#1a2a3a)',
      'linear-gradient(135deg,#0B1E3C,#3a2a1a)',
      'linear-gradient(135deg,#0B1E3C,#1a1a2a)',
    ];

    return `<div class="lb-row${isTie ? ' tie' : ''}">
      <div class="lb-rank ${rankClass}">${currentRank}</div>
      <div class="lb-avatar" style="background:${avatarColors[t.id - 1] || avatarColors[0]}">${t.id}</div>
      <div class="lb-info">
        <div class="lb-team">${t.name}</div>
        <div class="lb-players">${t.players}</div>
      </div>
      <div class="lb-progress">
        <div class="lb-progress-fill" style="width:${progressPct}%"></div>
      </div>
    </div>`;
  }).join('');
}

// ========== NAVIGATION ==========
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelector('.nav-btn[data-view="' + view + '"]').classList.add('active');
  if (view === 'public') renderLeaderboard();
  if (view === 'admin') renderTeams();
  lucide.createIcons();
}

// ========== MISC ==========
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function resetAll() {
  if (!confirm('Weet je zeker dat je ALLES wilt resetten?')) return;
  scores = {};
  challengeToggles = {};
  saveScores();
  saveToggles();
  renderTeams();
  renderLeaderboard();
  if (currentTeamId) showTeams();
  showToast('Alles gewist');
}

// ========== INIT ==========
renderTeams();
renderLeaderboard();
lucide.createIcons();
</script>
</body>
</html>
